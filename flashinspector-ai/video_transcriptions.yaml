# FlashInspector AI — Video Transcriptions & Violation Log
# Ground truth violations identified from fire safety inspection videos.
# Use this as reference for training and validating the model.
#
# Violation types:
#   - extinguisher_out_of_date: Expired inspection tag (detected by S5 OCR)
#   - extinguisher_non_compliant: Red/yellow non-compliance tag (needs: non_compliant_tag class)
#   - extinguisher_missing: Empty mount/cabinet (needs: empty_mount class)
#   - notification_too_high: Horn/strobe mounted too high (needs: notification_appliance class)
#   - exit_not_illuminated: Exit sign dark/unlit (needs: exit_sign_dark class)
#   - smoke_detector_missing: Detector unit missing from base (needs: smoke_detector_missing class)
#   - exit_blocked: Emergency exit obstructed (needs: blocked_exit class)
#   - pull_station_too_high: Pull station mounted too high (needs: pull_station class)
#   - fire_panel_trouble: FACP showing trouble/supervisory (needs: fire_alarm_panel class)

