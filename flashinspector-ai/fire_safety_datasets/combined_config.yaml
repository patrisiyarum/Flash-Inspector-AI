# FlashInspector AI - Combined Dataset Configuration
# This file is auto-generated by download_datasets.py after downloading datasets.
# It lists all available datasets and their classes.
#
# To regenerate, run: python download_datasets.py

datasets:
  fire_extinguisher:
    description: Fire extinguisher detection
    classes:
      - fire extinguisher
    source:
      workspace: fire-extinguisher
      project: fireextinguisher-z5atr
      version: 2

  fire_smoke:
    description: Fire and smoke detection
    classes:
      - fire
      - smoke
    source:
      workspace: mytyolov8
      project: mytest-hrswq
      version: 24

  emergency_exit:
    description: Emergency exit sign detection
    classes:
      - emergency exit sign
    source:
      workspace: emergency-exit-signs
      project: emergency-exit-signs
      version: 1

  construction_safety:
    description: Construction site safety detection
    classes:
      - Hardhat
      - Mask
      - NO-Hardhat
      - NO-Mask
      - NO-Safety Vest
      - Person
      - Safety Cone
      - Safety Vest
      - machinery
      - vehicle
    source:
      workspace: roboflow-universe-projects
      project: construction-site-safety
      version: 27

  extinguisher_missing:
    description: >
      Detects empty fire extinguisher mounting brackets, wall hooks, cabinets,
      and designated extinguisher locations where the extinguisher is absent.
      Used to flag "EXTINGUISHER MISSING" violations during inspections.
    classes:
      - empty_mount
      - extinguisher_cabinet_empty
    annotation_guide: >
      Annotate any wall bracket, hook, floor stand, or glass cabinet that is
      clearly meant to hold a fire extinguisher but is currently empty.
      Include the full bracket/mount area in the bounding box.
      Do NOT annotate brackets that have an extinguisher on them.
    source:
      workspace: custom
      project: extinguisher-missing
      version: 1

  non_compliant_tag:
    description: >
      Detects non-compliance tags attached to fire extinguishers. These are
      red/yellow/orange tags or stickers placed by inspectors to indicate
      the extinguisher has failed inspection and is non-compliant.
      Very common violation in the inspection videos.
    classes:
      - non_compliant_tag
    annotation_guide: >
      Annotate the colored tag (typically red, yellow, or orange) attached to
      or hanging from a fire extinguisher that indicates non-compliance.
      Draw the bbox around the tag itself, not the entire extinguisher.
    source:
      workspace: custom
      project: non-compliant-tag
      version: 1

  exit_sign_condition:
    description: >
      Detects exit signs that are not illuminated (dark/unlit). Normal lit
      exit signs are already detected by the emergency_exit dataset.
      This specifically identifies non-functioning exit signs.
    classes:
      - exit_sign_dark
    annotation_guide: >
      Annotate exit signs that are clearly not illuminated — the sign face
      is dark, partially lit, or visibly broken. Do NOT annotate properly
      functioning lit exit signs (those use the emergency_exit class).
    source:
      workspace: custom
      project: exit-sign-condition
      version: 1

  notification_appliance:
    description: >
      Detects fire alarm notification appliances (horn/strobes, speakers,
      bells) mounted on walls. Used to check mounting height compliance
      (ADA requires 80" max, NFPA requires 90" min for ceiling-mount).
    classes:
      - notification_appliance
    annotation_guide: >
      Annotate any fire alarm horn/strobe, speaker, or bell visible on
      walls or ceilings. Include the full device in the bounding box.
    source:
      workspace: custom
      project: notification-appliance
      version: 1

  pull_station:
    description: >
      Detects manual fire alarm pull stations mounted on walls.
      Used to verify presence and mounting height compliance
      (ADA: 48" max, typically 42"-48" above floor).
    classes:
      - pull_station
    annotation_guide: >
      Annotate any manual fire alarm pull station (red box with pull handle).
      Include the full device in the bounding box.
    source:
      workspace: custom
      project: pull-station
      version: 1

  smoke_detector_condition:
    description: >
      Detects smoke detector bases where the detector unit is missing.
      The base/mounting plate is on the ceiling but the actual detector
      is absent.
    classes:
      - smoke_detector_missing
    annotation_guide: >
      Annotate the circular ceiling-mount base where a smoke detector
      should be but the detector unit itself is absent. Also annotate
      intact smoke detectors as smoke_detector for comparison.
    source:
      workspace: custom
      project: smoke-detector-condition
      version: 1

  fire_alarm_panel:
    description: >
      Detects fire alarm control panels (FACPs). Used to read panel
      status lights (normal, trouble, supervisory, alarm) via the
      color of indicator LEDs.
    classes:
      - fire_alarm_panel
    annotation_guide: >
      Annotate the fire alarm control panel (FACP) — the metal box
      on the wall with status LEDs and controls. Include the full
      panel face in the bounding box.
    source:
      workspace: custom
      project: fire-alarm-panel
      version: 1

  blocked_exit:
    description: >
      Detects emergency exits that are blocked or obstructed by
      furniture, equipment, storage, or other objects.
    classes:
      - blocked_exit
    annotation_guide: >
      Annotate the area around an emergency exit door that is visibly
      blocked or obstructed. The bbox should cover the exit door and
      the obstructing objects.
    source:
      workspace: custom
      project: blocked-exit
      version: 1

  fire_extinguisher_tags:
    description: >
      Fire extinguishers with colored inspection tags (yellow, red, white).
      Yellow and red tags indicate non-compliance or failed inspection.
      White tags indicate current/valid inspection.
    classes:
      - fire_extinguisher
      - yellow_tag
      - red_tag
      - white_tag
    source:
      workspace: fire-hgcbk
      project: find-yellow-tags-fire-extinguishers-white-tags-and-red-tags-2
      version: 1

# Merged list of all unique classes across datasets
all_classes:
  # Equipment detection
  - fire extinguisher
  - fire
  - smoke
  - emergency exit sign
  - notification_appliance
  - pull_station
  - fire_alarm_panel
  # Violation / condition classes
  - empty_mount
  - extinguisher_cabinet_empty
  - non_compliant_tag
  - yellow_tag
  - red_tag
  - white_tag
  - exit_sign_dark
  - smoke_detector_missing
  - blocked_exit
  # Construction safety
  - Hardhat
  - Mask
  - NO-Hardhat
  - NO-Mask
  - NO-Safety Vest
  - Person
  - Safety Cone
  - Safety Vest
  - machinery
  - vehicle
